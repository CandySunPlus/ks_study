<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刷题工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Dashboard View -->
    <div id="dashboard-view" class="view">
        <header>
            <h1>刷题工具</h1>
            <p>智能练习 · 错题复习 · 知识巩固</p>
        </header>

        <div id="overall-stats" class="overall-stats">
            <div class="stat-item">
                <span class="stat-label">总完成题数</span>
                <span class="stat-value" id="total-completed">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">总体准确率</span>
                <span class="stat-value" id="overall-accuracy">0%</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">总错题数</span>
                <span class="stat-value" id="total-wrong">0</span>
            </div>
        </div>

        <div id="subjects-container" class="subjects-container">
            <!-- Subject cards will be rendered here -->
        </div>

        <div class="data-management">
            <button id="export-btn" class="btn btn-secondary">导出数据</button>
            <button id="import-btn" class="btn btn-secondary">导入数据</button>
            <button id="clear-btn" class="btn btn-danger">清除数据</button>
            <input type="file" id="import-file-input" accept=".json" style="display: none;">
        </div>
    </div>

    <!-- Practice/Review Mode View -->
    <div id="practice-view" class="view" style="display: none;">
        <header class="practice-header">
            <button id="exit-practice-btn" class="btn btn-secondary" aria-label="返回首页" title="返回首页">
                <span class="btn-icon">←</span>
                <span class="btn-text">返回</span>
            </button>
            <div class="header-center">
                <span id="question-counter" class="question-counter">练习 1/100</span>
            </div>
            <button id="nav-panel-toggle" class="btn btn-secondary" title="显示/隐藏导航面板 (V)" aria-label="切换导航面板">
                <span id="nav-panel-icon">导航</span>
            </button>
        </header>

        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
        </div>

        <div id="loading-indicator" class="loading-indicator" style="display: none;">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>

        <div id="question-container" class="question-container">
            <h2 id="question-title" class="question-title"></h2>

            <div id="answer-options" class="answer-options">
                <!-- Answer options will be rendered here -->
            </div>

            <div id="feedback" class="feedback" style="display: none;">
                <div id="feedback-message" class="feedback-message"></div>
                <div id="analysis-content" class="analysis-content" style="display: none;"></div>
            </div>

            <div class="navigation-controls">
                <button id="prev-btn" class="btn btn-secondary">上一题 (P)</button>
                <button id="submit-btn" class="btn btn-primary">提交 (Enter)</button>
                <button id="next-btn" class="btn btn-secondary">下一题 (N)</button>
            </div>
        </div>

        <div id="no-questions-message" class="no-questions-message" style="display: none;">
            <h2>没有错题需要复习</h2>
            <button id="back-to-dashboard-btn" class="btn btn-primary">返回首页</button>
        </div>

        <!-- Navigation Panel -->
        <div id="navigation-panel" class="navigation-panel" style="display: none;" role="navigation" aria-label="题目导航面板">
            <div class="navigation-panel-header">
                <h3>题目导航</h3>
            </div>
            <div id="question-grid" class="question-grid" role="grid" aria-label="题目网格">
                <!-- Question grid will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Practice Mode Selection Modal -->
    <div id="mode-selection-modal" class="modal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h2 class="modal-title">选择练习模式</h2>

            <div class="mode-group">
                <div class="mode-group-title">答题顺序</div>
                <div class="mode-options">
                    <label class="mode-option">
                        <input type="radio" name="practice-mode" value="sequential" checked>
                        <div class="mode-option-content">
                            <span class="mode-option-title">顺序练习</span>
                            <span class="mode-option-desc">按题目原始顺序依次练习</span>
                        </div>
                    </label>

                    <label class="mode-option">
                        <input type="radio" name="practice-mode" value="random">
                        <div class="mode-option-content">
                            <span class="mode-option-title">随机练习</span>
                            <span class="mode-option-desc">每次进入随机打乱题目顺序</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mode-group">
                <div class="mode-group-title">答题数据</div>
                <div class="mode-options">
                    <label class="mode-option">
                        <input type="radio" name="data-mode" value="continue" checked>
                        <div class="mode-option-content">
                            <span class="mode-option-title">继续上次进度</span>
                            <span class="mode-option-desc">恢复已答题目的选择和状态</span>
                        </div>
                    </label>

                    <label class="mode-option">
                        <input type="radio" name="data-mode" value="fresh">
                        <div class="mode-option-content">
                            <span class="mode-option-title">全新开始</span>
                            <span class="mode-option-desc">清除当前科目所有作答记录和统计</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="modal-actions">
                <button id="modal-start-btn" class="btn btn-primary">开始练习</button>
                <button id="modal-cancel-btn" class="btn btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
